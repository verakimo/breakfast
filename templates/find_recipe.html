<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search recipes | Hyvä aamiainen</title>
</head>
<body>
  <header>
    <h1>Hyvä aamiainen</h1>
    <p>Breakfast recipes worth waking up for!</p>
  </header>

  <main>
    <h2>Search recipes</h2>

    <form action="/find_recipe" method="get">
      <p>
        <label for="query">Keyword</label><br>
        <input
          id="query"
          name="query"
          type="text"
          value="{{ query }}"
          maxlength="100"
        >
      </p>

      <button type="submit">Search</button>
    </form>

    <p><a href="/">Return to the home page</a></p>

    {% if query %}
      <section>
        <h2>Search results</h2>

        {% for recipe in results %}
          <p>
            <a href="/recipe/{{ recipe.id }}">{{ recipe.title }}</a>
          </p>
        {% else %}
          <p>No matching recipes were found.</p>
        {% endfor %}
      </section>
    {% endif %}
  </main>
</body>
</html>
