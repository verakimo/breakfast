<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add a recipe | Hyvä aamiainen</title>
</head>
<body>
  <header>
    <h1>Hyvä aamiainen</h1>
    <p>Breakfast recipes worth waking up for!</p>
  </header>

  <main>
    <h2>Add a recipe</h2>

    <form action="/create_recipe" method="post">
      <p>
        <label for="title">Recipe title</label><br>
        <input id="title" name="title" type="text"
          maxlength="100" required>
      </p>

      <p>
        <label for="ingredients">Ingredients</label><br>
        <textarea id="ingredients" name="ingredients"
          rows="8" cols="50" maxlength="5000" required></textarea>
      </p>

      <p>
        <label for="instructions">Preparation instructions</label><br>
        <textarea id="instructions" name="instructions"
          rows="10" cols="50" maxlength="5000" required></textarea>
      </p>

      <p>
        <label for="preparation_time">Preparation time in minutes</label><br>
        <input id="preparation_time" name="preparation_time"
          type="number" min="1" required>
      </p>

      <button type="submit">Add recipe</button>
    </form>

    <p><a href="/">Return to the home page</a></p>
  </main>
</body>
</html>
