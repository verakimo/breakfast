<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete recipe | Hyvä aamiainen</title>
</head>
<body>
  <header>
    <h1>Hyvä aamiainen</h1>
    <p>Breakfast recipes worth waking up for!</p>
  </header>

  <main>
    <h2>Delete recipe</h2>

    <p>Recipe: {{ recipe.title }}</p>
    <p>Are you sure you want to delete this recipe?</p>

    <form action="/remove_recipe/{{ recipe.id }}" method="post">
      <button type="submit" name="remove">Delete recipe</button>
      <button type="submit" name="back">Go back</button>
    </form>
  </main>
</body>
</html>
